#
# Cloud Build config for kin-vfs repo.
#
# On every push: run tests
# Tagged GitHub releases publish kin-vfs-core to KinLab registry

steps:
  # Run tests
  - name: 'rust:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
        cargo test --workspace
    id: 'test'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
