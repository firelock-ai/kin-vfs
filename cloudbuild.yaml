#
# Cloud Build config for kin-vfs repo.
#
# On every push: run tests
# On push to main: publish kin-vfs-core crate to KinLab registry

steps:
  # Run tests
  - name: 'rust:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
        cargo test --workspace
    id: 'test'

  # Publish crate to KinLab registry (only on main)
  - name: 'rust:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" != "main" ]; then
          echo "Not main branch ($BRANCH_NAME), skipping publish"
          exit 0
        fi
        apt-get update && apt-get install -y pkg-config libssl-dev curl && rm -rf /var/lib/apt/lists/*
        cargo package -p kin-vfs-core --allow-dirty --no-verify
        VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print([p['version'] for p in pkgs if p['name']=='kin-vfs-core'][0])")
        curl -sf -X POST "${_REGISTRY_URL}/registry/cargo/api/v1/crates/publish?name=kin-vfs-core&version=$VERSION" \
          -H "content-type: application/octet-stream" \
          --data-binary "@target/package/kin-vfs-core-$VERSION.crate" \
          && echo "Published kin-vfs-core@$VERSION" \
          || echo "kin-vfs-core@$VERSION already published (or error)"
    id: 'publish'
    waitFor: ['test']

substitutions:
  _REGISTRY_URL: 'https://kinlab.ai'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
