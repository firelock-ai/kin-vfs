name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve, not just the solution you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Shim (LD_PRELOAD / DYLD_INSERT_LIBRARIES)
        - FUSE Mount
        - NFS
        - Daemon / Protocol
        - CLI
        - Windows ProjFS
        - Documentation
        - Other
