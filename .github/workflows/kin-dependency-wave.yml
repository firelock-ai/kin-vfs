name: Kin Dependency Wave

on:
  repository_dispatch:
    types: [kin-registry-release]
  workflow_dispatch:
  schedule:
    - cron: "43 * * * *"

jobs:
  dependency-wave:
    uses: firelock-ai/kin-actions/.github/workflows/cargo-dependency-wave.yml@v0.1.9
    with:
      manifests: Cargo.toml
      test-command: cargo check --workspace
    secrets:
      KIN_CI_BOT_TOKEN: ${{ secrets.KIN_CI_BOT_TOKEN }}
