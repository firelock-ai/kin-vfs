name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # The unfinished Windows ProjFS target is non-blocking (see the
    # windows-latest matrix entry below for why); Linux/macOS failures still
    # fail CI. `matrix.experimental` is unset (falsey) for the required OSes.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            packages: "--workspace"
          - os: macos-latest
            packages: "--workspace"
          # Windows ProjFS port is unfinished: crates/kin-vfs-shim/src/platform/
          # windows.rs has never compiled (14 errors vs windows 0.58 as of
          # Jun 2026 — E0432 unresolved imports, E0308 type mismatch, E0061 arg
          # count, E0369 missing operator). Marked experimental so its failure
          # is visible-but-non-blocking until the port lands; see the platform
          # status table in README.md / CLAUDE.md.
          - os: windows-latest
            packages: "-p kin-vfs-core -p kin-vfs-shim -p kin-vfs-daemon -p kin-vfs-cli"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy ${{ matrix.packages }} --all-targets
      - name: Build
        run: cargo build ${{ matrix.packages }}
      - name: Test
        run: cargo test ${{ matrix.packages }}

  notify-downstream:
    name: Notify Downstream Repos
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check]
    runs-on: ubuntu-latest
    env:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
    steps:
      - name: Trigger kin CI
        # Skip cleanly when DISPATCH_TOKEN is not provisioned so the job stays
        # green instead of failing on a missing secret (secrets can't be read
        # in a job-level `if:`, so the guard lives on the step).
        if: env.DISPATCH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          # Requires a PAT with repo scope stored as DISPATCH_TOKEN secret.
          # Create at: GitHub > Settings > Developer settings > Personal access tokens
          # Then add to: kin-vfs repo > Settings > Secrets > Actions > DISPATCH_TOKEN
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: firelock-ai/kin
          event-type: dependency-updated
          client-payload: '{"source": "kin-vfs", "sha": "${{ github.sha }}"}'
