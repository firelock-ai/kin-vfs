name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            packages: "--workspace"
          - os: macos-latest
            packages: "--workspace"
          # Windows: build core, shim (ProjFS), daemon (named pipe), and CLI.
          - os: windows-latest
            packages: "-p kin-vfs-core -p kin-vfs-shim -p kin-vfs-daemon -p kin-vfs-cli"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy ${{ matrix.packages }} --all-targets
      - name: Build
        run: cargo build ${{ matrix.packages }}
      - name: Test
        run: cargo test ${{ matrix.packages }}

  notify-downstream:
    name: Notify Downstream Repos
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kin CI
        uses: peter-evans/repository-dispatch@v3
        with:
          # Requires a PAT with repo scope stored as DISPATCH_TOKEN secret.
          # Create at: GitHub > Settings > Developer settings > Personal access tokens
          # Then add to: kin-vfs repo > Settings > Secrets > Actions > DISPATCH_TOKEN
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: firelock-ai/kin
          event-type: dependency-updated
          client-payload: '{"source": "kin-vfs", "sha": "${{ github.sha }}"}'
