name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            packages: "--workspace"
          - os: macos-latest
            packages: "--workspace"
          # Windows: build kin-vfs-core + kin-vfs-shim (ProjFS) only.
          # The daemon and CLI use Unix sockets and do not yet compile on Windows.
          - os: windows-latest
            packages: "-p kin-vfs-core -p kin-vfs-shim"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy ${{ matrix.packages }} --all-targets
      - name: Build
        run: cargo build ${{ matrix.packages }}
      - name: Test
        run: cargo test ${{ matrix.packages }}
