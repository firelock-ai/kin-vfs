name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # The unfinished Windows ProjFS target is non-blocking (see the
    # windows-latest matrix entry below for why); Linux/macOS failures still
    # fail CI. `matrix.experimental` is unset (falsey) for the required OSes.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            packages: "--workspace"
          # Required native arm64 lane. The preload shim is architecture-bound,
          # and glibc stat-family ABI differences are not exercised by x86_64.
          - os: ubuntu-24.04-arm
            packages: "--workspace"
          - os: macos-latest
            packages: "--workspace"
          # Windows ProjFS port is unfinished: crates/kin-vfs-shim/src/platform/
          # windows.rs has never compiled (14 errors vs windows 0.58 as of
          # Jun 2026 — E0432 unresolved imports, E0308 type mismatch, E0061 arg
          # count, E0369 missing operator). Marked experimental so its failure
          # is visible-but-non-blocking until the port lands; see the platform
          # status table in README.md / CLAUDE.md.
          - os: windows-latest
            packages: "-p kin-vfs-core -p kin-vfs-shim -p kin-vfs-daemon -p kin-vfs-cli"
            experimental: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy ${{ matrix.packages }} --all-targets
      - name: Build
        run: cargo build ${{ matrix.packages }}
      - name: Test
        run: cargo test ${{ matrix.packages }}
