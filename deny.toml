#
# cargo-deny configuration for the kin-vfs workspace.
# Checks: advisories, licenses, bans, sources.
# Run locally: cargo deny check

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# --- Advisory database ---
[advisories]
ignore = []

# --- License policy ---
[licenses]
# kin-vfs is Apache-2.0. All transitive dependencies must use compatible licenses.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# --- Crate bans ---
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# --- Source provenance ---
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["firelock-ai"]
